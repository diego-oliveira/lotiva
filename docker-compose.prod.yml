services:
  postgres:
    image: postgres:16-alpine
    container_name: lotiva_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lotiva}
      POSTGRES_USER: ${POSTGRES_USER:-lotiva_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lotiva_user} -d ${POSTGRES_DB:-lotiva}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lotiva

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER:-lotiva_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lotiva}?schema=public
    container_name: lotiva_app_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-lotiva_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lotiva}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      UPLOAD_DIR: /app/uploads
      UPLOAD_PUBLIC_PATH: /uploads
      DOCUMENT_STORAGE_DIR: /app/documents
    volumes:
      - uploads_data:/app/uploads
      - documents_data:/app/documents
    ports:
      - '${APP_PORT:-3000}:3000'
    networks:
      - lotiva

volumes:
  postgres_data:
  uploads_data:
  documents_data:

networks:
  lotiva:
    driver: bridge
